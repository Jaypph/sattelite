<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<title>KSC Mission Control</title>
<style>
body { margin:0; background:black; font-family:"Courier New",monospace; display:flex; height:100vh; overflow:hidden;}
#terminal { width:40%; padding:20px; overflow-y:auto; font-size:14px; color:#00ff00; border-right:2px solid #00ff00;}
.line::before { content:"root@ksc:~$ "; }
#map { width:60%; position:relative; background:radial-gradient(circle at center,#001a33,#000); overflow:hidden; }
#earth { position:absolute; width:300px; height:300px; border-radius:50%; background:radial-gradient(circle,#003366,#000); top:50%; left:50%; transform:translate(-50%,-50%); box-shadow:0 0 40px #00ff88; }
.satellite { position:absolute; width:8px; height:8px; border-radius:50%; background:#00ff88; box-shadow:0 0 10px #00ff88; z-index:10; }
.label { position:absolute; font-size:10px; color:#00ff88; z-index:10; }
</style>
</head>
<body>
<div id="terminal"></div>
<div id="map"><div id="earth"></div></div>
<script>
// ---------------- TERMINAL ----------------
const terminal=document.getElementById("terminal");
let systemState="NORMAL";

function rand(max){return Math.floor(Math.random()*max);}
function log(text,color="#00ff00"){let div=document.createElement("div"); div.style.color=color; div.textContent=text; terminal.appendChild(div); terminal.scrollTop=terminal.scrollHeight;}

function commandLoop(){
  let cpu=rand(40)+(systemState==="CRITICAL"?50:10);
  let mem=rand(30)+(systemState==="CRITICAL"?40:10);
  let cmds=[
    `top → CPU:${cpu}% MEM:${mem}% STATE:${systemState}`,
    `ping sat-node → ${rand(200)+(systemState==="CRITICAL"?200:0)} ms`,
    `ssh relay → ${systemState==="CRITICAL"?"DELAY":"OK"}`,
    `scan net → host 10.0.0.${rand(255)} open`
  ];
  log("root@ksc:~$ "+cmds[rand(cmds.length)]);
  setTimeout(commandLoop,700);
}

setInterval(()=>{
  let r=Math.random();
  if(r>0.85){systemState="CRITICAL"; log("!!! CRITICAL SIGNAL BREACH !!!","#ff4444");}
  else if(r>0.65){systemState="WARNING"; log("!! LINK UNSTABLE !!","#ffaa00");}
  else{systemState="NORMAL";}
},5000);

commandLoop();

// ---------------- SATELLITES ----------------
const map=document.getElementById("map");
let sats=[];

function createSatellite(name){
  let el=document.createElement("div"); el.className="satellite"; map.appendChild(el);
  let label=document.createElement("div"); label.className="label"; map.appendChild(label);
  return {el,label,name,angle:Math.random()*Math.PI*2,speed:0.002+Math.random()*0.003};
}

function loadDemoSatellites(){
  const names=["ISS","HUBBLE","STARLINK","GPS-X","POLAR","ORBIT"];
  names.forEach(n=>sats.push(createSatellite(n)));
  updateSatellites();
}

function updateSatellites(){
  const centerX=map.offsetWidth/2;
  const centerY=map.offsetHeight/2;
  sats.forEach(s=>{
    s.angle+=s.speed;
    let radius=180+Math.sin(s.angle*2)*30;
    let x=centerX+Math.cos(s.angle)*radius;
    let y=centerY+Math.sin(s.angle)*radius;
    s.el.style.left=x+"px"; s.el.style.top=y+"px";
    s.label.style.left=(x+10)+"px"; s.label.style.top=y+"px";
    s.label.textContent=s.name;
  });
  requestAnimationFrame(updateSatellites);
}

// Start demo (ingen API, altid synlige satellitter)
loadDemoSatellites();
</script>
</body>
</html>
