<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<title>Mission Control - Live Satellites</title>

<script src="https://unpkg.com/satellite.js@5.0.1/dist/satellite.min.js"></script>

<style>
body { margin:0; background:black; font-family:"Courier New",monospace; display:flex; height:100vh; overflow:hidden;}
#terminal { width:40%; padding:20px; overflow-y:auto; font-size:14px; color:#00ff00; border-right:2px solid #00ff00;}
.line::before { content:"root@ksc:~$ "; }

#map { width:60%; position:relative; background:radial-gradient(circle at center,#001a33,#000); }
#earth { position:absolute; width:300px; height:300px; border-radius:50%; background:radial-gradient(circle,#003366,#000); top:50%; left:50%; transform:translate(-50%,-50%); box-shadow:0 0 40px #00ff88; }

.satellite {
  z-index: 10;
}
.label {
  z-index: 10;
}
.line-to-earth { position:absolute; width:1px; background:rgba(0,255,0,0.3); transform-origin:top left;}
</style>
</head>

<body>

<div id="terminal"></div>

<div id="map">
  <div id="earth"></div>
</div>

<script>
// ---------------- TERMINAL ----------------
const terminal = document.getElementById("terminal");

let systemState = "NORMAL";

function rand(max){return Math.floor(Math.random()*max);}

function log(text, color="#00ff00"){
  let div=document.createElement("div");
  div.style.color=color;
  div.textContent=text;
  terminal.appendChild(div);
  terminal.scrollTop=terminal.scrollHeight;
}

function commandLoop(){
  let cpu = rand(40)+(systemState==="CRITICAL"?50:10);

  let cmds = [
    `top → CPU:${cpu}% STATE:${systemState}`,
    `ping sat-node → ${rand(200)} ms`,
    `ssh relay → ${systemState==="CRITICAL"?"DELAY":"OK"}`,
    `scan net → host 10.0.0.${rand(255)} open`
  ];

  log("root@ksc:~$ "+cmds[rand(cmds.length)]);
  setTimeout(commandLoop, 700);
}

setInterval(()=>{
  let r=Math.random();
  if(r>0.85){
    systemState="CRITICAL";
    log("!!! CRITICAL SIGNAL BREACH !!!","#ff4444");
  } else if(r>0.65){
    systemState="WARNING";
    log("!! LINK UNSTABLE !!","#ffaa00");
  } else {
    systemState="NORMAL";
  }
},5000);

commandLoop();


// ---------------- SATELLITES ----------------

const map = document.getElementById("map");

let sats = [];

async function loadSatellites(){
  let res = await fetch("https://celestrak.org/NORAD/elements/gp.php?GROUP=active&FORMAT=json");
  let data = await res.json();

  data.slice(0, 20).forEach(sat=>{
    if(!sat.TLE_LINE1 || !sat.TLE_LINE2) return;

    try {
      let satrec = satellite.twoline2satrec(sat.TLE_LINE1, sat.TLE_LINE2);

      let el = document.createElement("div");
      el.className="satellite";
      map.appendChild(el);

      let label = document.createElement("div");
      label.className="label";
      map.appendChild(label);

      sats.push({
        satrec,
        el,
        label,
        name: sat.OBJECT_NAME || "SAT"
      });

    } catch(e){
      console.log("Skipping bad satellite");
    }
  });
}

function updateSatellites(){
  let now = new Date();

  const centerX = map.offsetWidth / 2;
  const centerY = map.offsetHeight / 2;

  sats.forEach(s=>{
    let posVel = satellite.propagate(s.satrec, now);
    if(!posVel.position) return;

    let gmst = satellite.gstime(now);
    let geo = satellite.eciToGeodetic(posVel.position, gmst);

    let lat = satellite.degreesLat(geo.latitude);
    let lon = satellite.degreesLong(geo.longitude);

    // 🛰️ PRO FIX: brug lon som orbit-vinkel
    let angle = lon * Math.PI / 180;

    let radius = 200 + (lat * 0.5); // variation

    let x = centerX + Math.cos(angle) * radius;
    let y = centerY + Math.sin(angle) * radius;

    s.el.style.left = x + "px";
    s.el.style.top = y + "px";

    s.label.style.left = (x + 10) + "px";
    s.label.style.top = y + "px";
    s.label.textContent = s.name;
  });

  requestAnimationFrame(updateSatellites);
}

loadSatellites().then(updateSatellites);

</script>
</body>
</html>
